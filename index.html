<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>studio.ai — Panel de Agencia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f; --bg2: #141416; --bg3: #1a1a1e;
    --border: rgba(255,255,255,0.07); --border-hi: rgba(255,255,255,0.15);
    --text: #e8e6e0; --muted: #7a7872; --dim: #3a3835;
    --prod: #00e5a0; --prod-bg: rgba(0,229,160,0.08); --prod-mid: rgba(0,229,160,0.15);
    --mkt: #ff6b35;  --mkt-bg: rgba(255,107,53,0.08);  --mkt-mid: rgba(255,107,53,0.15);
    --ges: #7c6dfa;  --ges-bg: rgba(124,109,250,0.08); --ges-mid: rgba(124,109,250,0.15);
    --ceo: #f5c842;  --ceo-bg: rgba(245,200,66,0.08);
    --r: 12px; --rs: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 17px; }
  .logo span { color: var(--ceo); }
  .status { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--prod); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* Layout principal */
  .body { flex: 1; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 200px; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 12px 8px; gap: 4px; flex-shrink: 0; }
  .nav-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--rs); border: none; background: none; color: var(--muted); cursor: pointer; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; width: 100%; text-align: left; transition: all 0.15s; }
  .nav-btn:hover { background: var(--bg3); color: var(--text); }
  .nav-btn.active { background: var(--bg3); color: var(--text); }
  .nav-btn .icon { width: 22px; height: 22px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; }
  .nav-btn[data-agent="ceo"] .icon    { background: var(--ceo-bg); color: var(--ceo); }
  .nav-btn[data-agent="producto"] .icon { background: var(--prod-bg); color: var(--prod); }
  .nav-btn[data-agent="marketing"] .icon { background: var(--mkt-bg); color: var(--mkt); }
  .nav-btn[data-agent="gestion"] .icon  { background: var(--ges-bg); color: var(--ges); }
  .nav-btn[data-agent="ceo"].active .icon    { background: var(--ceo-bg); }
  .nav-divider { height: 1px; background: var(--border); margin: 4px 4px; }
  .nav-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim); padding: 8px 12px 4px; letter-spacing: 0.5px; }
  .badge { margin-left: auto; min-width: 18px; height: 18px; border-radius: 9px; background: var(--ceo); color: #000; font-size: 10px; font-weight: 700; display: flex; align-items: center; justify-content: center; padding: 0 5px; font-family: 'DM Mono', monospace; }

  /* Panel de chat */
  .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .agent-header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .agent-avatar { width: 32px; height: 32px; border-radius: var(--rs); display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .agent-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .agent-role { font-size: 12px; color: var(--muted); }
  .clear-btn { margin-left: auto; padding: 5px 12px; background: none; border: 1px solid var(--border); border-radius: var(--rs); color: var(--muted); font-size: 11px; font-family: 'DM Mono', monospace; cursor: pointer; transition: all 0.15s; }
  .clear-btn:hover { border-color: var(--border-hi); color: var(--text); }

  /* Chat area */
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Welcome */
  .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; color: var(--dim); padding: 40px; }
  .welcome-icon { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; margin-bottom: 6px; }
  .welcome h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--muted); }
  .welcome p { font-size: 13px; max-width: 300px; line-height: 1.6; }
  .quick-prompts { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; margin-top: 8px; }
  .qp { padding: 7px 13px; background: var(--bg3); border: 1px solid var(--border); border-radius: 100px; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
  .qp:hover { border-color: var(--border-hi); color: var(--text); }

  /* Mensajes */
  .msg { display: flex; gap: 10px; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg-av { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; font-family: 'Syne', sans-serif; flex-shrink: 0; margin-top: 2px; }
  .msg.user .msg-av { background: var(--bg3); color: var(--muted); border: 1px solid var(--border); }
  .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: var(--r); font-size: 13.5px; line-height: 1.7; }
  .msg.user .msg-bubble { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r) 3px var(--r) var(--r); }
  .msg:not(.user) .msg-bubble { background: var(--bg2); border: 1px solid var(--border); border-radius: 3px var(--r) var(--r) var(--r); }
  .msg-bubble strong { font-weight: 500; }
  .msg-bubble ul { margin: 6px 0 6px 16px; }
  .msg-bubble li { margin-bottom: 3px; }
  .msg-bubble p + p { margin-top: 8px; }
  .msg-bubble h3, .msg-bubble h4 { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; margin: 10px 0 4px; }
  .msg-bubble code { font-family: 'DM Mono', monospace; font-size: 11px; background: var(--bg3); border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; }
  .msg-bubble pre { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rs); padding: 10px 12px; margin: 8px 0; overflow-x: auto; font-family: 'DM Mono', monospace; font-size: 11px; line-height: 1.6; }

  /* Tag de agente en mensaje */
  .agent-tag { display: inline-flex; align-items: center; gap: 5px; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-family: 'DM Mono', monospace; font-weight: 500; margin-bottom: 6px; }

  /* Typing */
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 2px 0; }
  .typing-dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-5px);opacity:1} }

  /* Notificación de delegación */
  .delegation-notice { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rs); font-size: 12px; color: var(--muted); font-family: 'DM Mono', monospace; animation: fadeUp 0.2s ease; }
  .delegation-notice .arrow { color: var(--ceo); }

  /* Input */
  .input-area { padding: 12px 20px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .attach-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .attach-btn { padding: 4px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--rs); color: var(--muted); font-size: 11px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; font-family: 'DM Sans', sans-serif; }
  .attach-btn:hover { border-color: var(--border-hi); color: var(--text); }
  .file-chip { padding: 3px 8px; background: var(--bg3); border: 1px solid var(--border); border-radius: 100px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); display: flex; align-items: center; gap: 5px; }
  .file-chip button { background: none; border: none; color: var(--dim); cursor: pointer; font-size: 12px; line-height: 1; padding: 0; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .input-wrap { flex: 1; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); display: flex; align-items: flex-end; padding: 9px 12px; transition: border-color 0.15s; }
  .input-wrap:focus-within { border-color: var(--border-hi); }
  .input-wrap textarea { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; resize: none; line-height: 1.5; max-height: 120px; min-height: 21px; }
  .input-wrap textarea::placeholder { color: var(--dim); }
  .send-btn { width: 36px; height: 36px; border-radius: var(--rs); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; flex-shrink: 0; background: var(--ceo); color: #000; }
  .send-btn:hover { opacity: 0.85; transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .input-hint { margin-top: 6px; font-size: 10px; color: var(--dim); font-family: 'DM Mono', monospace; }

  /* Colores por agente */
  .c-ceo    { color: var(--ceo); }
  .c-prod   { color: var(--prod); }
  .c-mkt    { color: var(--mkt); }
  .c-ges    { color: var(--ges); }
  .bg-ceo   { background: var(--ceo-bg); }
  .bg-prod  { background: var(--prod-bg); }
  .bg-mkt   { background: var(--mkt-bg); }
  .bg-ges   { background: var(--ges-bg); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">studio<span>.</span>ai</div>
  <div class="status"><div class="dot"></div>4 agentes activos</div>
</div>

<div class="body">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="nav-label">CENTRAL</div>
    <button class="nav-btn active" data-agent="ceo" onclick="showAgent('ceo')">
      <div class="icon">★</div>
      CEO
      <span class="badge" id="badge-ceo" style="display:none">0</span>
    </button>
    <div class="nav-divider"></div>
    <div class="nav-label">AGENTES</div>
    <button class="nav-btn" data-agent="producto" onclick="showAgent('producto')">
      <div class="icon">⚙</div>
      Producto
      <span class="badge" id="badge-producto" style="display:none;background:var(--prod)">0</span>
    </button>
    <button class="nav-btn" data-agent="marketing" onclick="showAgent('marketing')">
      <div class="icon">◆</div>
      Marketing
      <span class="badge" id="badge-marketing" style="display:none;background:var(--mkt);color:#fff">0</span>
    </button>
    <button class="nav-btn" data-agent="gestion" onclick="showAgent('gestion')">
      <div class="icon">▣</div>
      Gestión
      <span class="badge" id="badge-gestion" style="display:none;background:var(--ges);color:#fff">0</span>
    </button>
  </div>

  <!-- Chat panel -->
  <div class="chat-panel" id="chat-panel">
    <!-- Se genera dinámicamente -->
  </div>

</div>

<script>
// ── CONFIGURACIÓN DE AGENTES ──────────────────────────────────────────────────
const AGENTS = {
  ceo: {
    name: 'Agente CEO',
    role: 'Analiza el cliente y delega al agente correcto',
    color: 'var(--ceo)', bg: 'var(--ceo-bg)', cls: 'c-ceo bg-ceo',
    initials: 'CEO',
    welcome: 'Contame sobre tu cliente o proyecto. Yo analizo y delego automáticamente al agente que corresponde.',
    placeholder: 'Describí el cliente o el proyecto...',
    quickPrompts: [
      { label: '📦 Mayorista cables', text: 'Tengo un cliente mayorista de cables. Usa un Excel para compartir su catálogo con sus clientes. Quiere que los comercios puedan ver los productos y hacer pedidos online.' },
      { label: '🍦 Heladería gestión', text: 'Tengo una heladería. El dueño necesita saber cuánto helado producir cada día, controlar el stock y registrar las ventas.' },
      { label: '🚗 Rentadora chatbot', text: 'Tengo una rentadora de autos. Necesitan un chatbot para atender consultas y un CRM para gestionar sus clientes.' },
      { label: '🌐 Landing page', text: 'Un cliente necesita una landing page profesional. Todavía no tiene presencia online.' },
    ],
    system: `Sos el Agente CEO de studio.ai, una agencia de servicios digitales para pymes argentinas. 
Tu trabajo es analizar el pedido del usuario y decidir qué agente debe actuar.

IMPORTANTE: Respondé SIEMPRE con un JSON válido con este formato exacto:
{
  "resumen": "2-3 líneas explicando el problema del cliente",
  "delegar_a": "producto" | "marketing" | "gestion",
  "motivo": "por qué elegiste ese agente",
  "instruccion": "instrucción detallada para el agente destino, incluyendo todo el contexto relevante del cliente"
}

Reglas de delegación:
- "producto": cuando hay que diseñar o construir algo técnico (web app, sistema, chatbot, landing, automatización)
- "marketing": cuando hay que armar propuesta comercial, presupuesto, copy, estrategia de captación
- "gestion": cuando hay que organizar proyectos, contratos, finanzas, acuerdos entre socios

No respondas con texto libre. Solo el JSON.`
  },

  producto: {
    name: 'Agente Producto',
    role: 'Diseña soluciones técnicas y genera código o guías paso a paso',
    color: 'var(--prod)', bg: 'var(--prod-bg)', cls: 'c-prod bg-prod',
    initials: 'PRD',
    welcome: 'Describime qué hay que construir. Te doy la arquitectura, herramientas y pasos concretos.',
    placeholder: 'Describí qué producto hay que construir...',
    quickPrompts: [
      { label: '📦 Catálogo mayorista', text: 'Necesito construir un catálogo digital con sistema de pedidos para un mayorista de cables. Sus clientes son comercios. Maneja todo en Excel.' },
      { label: '🍦 Sistema heladería', text: 'Sistema de gestión para una heladería: producción diaria, stock de ingredientes y registro de ventas. El dueño no sabe de tecnología.' },
      { label: '🚗 Chatbot rentadora', text: 'Chatbot para una rentadora de autos que responda preguntas frecuentes, muestre disponibilidad y tome reservas.' },
      { label: '🌐 Landing HTML', text: 'Generame el código HTML completo para una landing page profesional para un comercio local.' },
    ],
    system: `Sos el Agente de Producto de studio.ai, una agencia de servicios digitales para pymes argentinas.

Stack preferido (no-code/low-code):
- Web apps y catálogos: Glide Apps, Softr, AppSheet (conectados a Google Sheets)
- Sitios y landing pages: Webflow, Framer, o HTML/CSS directo
- Chatbots: Typebot, Manychat
- CRM: Notion, Airtable, HubSpot free
- Automatizaciones: Make, n8n, Zapier
- Base de datos: Google Sheets, Airtable, Notion

Tu función:
1. Diseñar la arquitectura más simple posible
2. Especificar herramientas y configuración paso a paso
3. Generar código si es necesario (HTML, JS, prompts para chatbots)
4. Dar una guía que alguien con bajo nivel técnico pueda seguir

Principios:
- La solución más simple que resuelve el problema es la mejor
- Tiempo objetivo: menos de 1 semana para proyectos simples
- El cliente debe poder actualizar sus datos sin ayuda técnica
- Todo debe ser escalable

Respondé en español rioplatense. Sé específico pero explicá en términos simples. Usá listas y secciones claras.`
  },

  marketing: {
    name: 'Agente Marketing',
    role: 'Propuestas comerciales, precios, copy y estrategia de captación',
    color: 'var(--mkt)', bg: 'var(--mkt-bg)', cls: 'c-mkt bg-mkt',
    initials: 'MKT',
    welcome: 'Contame qué querés vender o comunicar. Te armo la propuesta, el precio y el mensaje.',
    placeholder: '¿Qué querés vender o comunicar?',
    quickPrompts: [
      { label: '📄 Propuesta comercial', text: 'Armame una propuesta comercial para venderle a un mayorista de cables una web app con catálogo digital y sistema de pedidos.' },
      { label: '💰 Tabla de precios', text: 'Generame una tabla de precios orientativa para nuestros servicios: landing page, web app, sistema de gestión, chatbot y CRM. Para pymes locales argentinas.' },
      { label: '📱 Posts Instagram', text: 'Escribime 3 posts para Instagram mostrando el antes y después de digitalizar un negocio local con nuestros servicios.' },
      { label: '🎯 Guion de ventas', text: '¿Cómo prospecto comercios locales de mi ciudad? Dame un guion para la primera conversación.' },
    ],
    system: `Sos el Agente de Marketing de studio.ai, una agencia de servicios digitales para pymes en Argentina.

Tu función:
1. Generar propuestas comerciales profesionales y persuasivas
2. Armar presupuestos y estructuras de precios
3. Crear contenido para redes sociales (Instagram, LinkedIn, WhatsApp)
4. Diseñar estrategias de captación de clientes locales
5. Escribir guiones de ventas y mensajes de prospección

Precios de referencia (ARS, ajustar según contexto):
- Landing page básica: $150.000 - $300.000 (una vez)
- Catálogo digital / web app: $400.000 - $800.000 (una vez) + mantenimiento
- Sistema de gestión: $500.000 - $1.200.000 (una vez)
- Chatbot básico: $300.000 - $600.000 (una vez) + mantenimiento mensual
- CRM simple: $200.000 - $500.000 (una vez)
- Pack completo: $1.200.000 - $2.500.000

Tono: cercano, directo, sin tecnicismos. Foco en el beneficio concreto, no en la tecnología.
Contexto: somos 3 socios jóvenes que conocen los negocios locales. Esa cercanía es nuestra ventaja.

Respondé en español rioplatense.`
  },

  gestion: {
    name: 'Agente Gestión',
    role: 'Proyectos, contratos, finanzas y operaciones de la agencia',
    color: 'var(--ges)', bg: 'var(--ges-bg)', cls: 'c-ges bg-ges',
    initials: 'GES',
    welcome: 'Contame qué necesitás organizar. Te ayudo con proyectos, contratos, finanzas o acuerdos.',
    placeholder: '¿Qué necesitás gestionar u organizar?',
    quickPrompts: [
      { label: '📋 Estado proyectos', text: 'Tenemos 3 clientes: mayorista cables (web app en desarrollo), heladería (en análisis) y rentadora (presupuesto enviado). Armame un tablero de seguimiento.' },
      { label: '📝 Modelo contrato', text: '¿Cómo estructuro los contratos con clientes para proyectos de apps y automatizaciones? Somos 3 socios.' },
      { label: '🤝 Acuerdo socios', text: '¿Cómo dividir ganancias y responsabilidades entre 3 socios en una agencia de servicios digitales que está empezando?' },
      { label: '📊 Template mensual', text: 'Armame un template para el seguimiento mensual de ingresos, proyectos y tareas de nuestra agencia.' },
    ],
    system: `Sos el Agente de Gestión de studio.ai, una agencia de servicios digitales fundada por 3 socios en Argentina.

Tu función:
1. Seguimiento de proyectos y clientes activos
2. Estructurar acuerdos entre socios (roles, responsabilidades, ganancias)
3. Diseñar contratos y acuerdos con clientes
4. Organizar flujo de trabajo y prioridades del equipo
5. Crear templates de seguimiento (proyectos, ingresos, tareas)
6. Dar recomendaciones para escalar el negocio
7. Gestión financiera básica (ingresos, gastos, proyecciones)

Principios:
- La agencia está empezando: priorizá simplicidad sobre sistemas complejos
- Usá herramientas gratuitas: Notion, Google Sheets, Trello, WhatsApp
- Los 3 socios tienen perfiles complementarios: repartí el trabajo de manera equilibrada
- Protegé el tiempo del equipo

Respondé en español rioplatense. Sé práctico, concreto y orientado a la acción.`
  }
};

// ── ESTADO ────────────────────────────────────────────────────────────────────
let currentAgent = 'ceo';
const histories = { ceo: [], producto: [], marketing: [], gestion: [] };
const files = { ceo: [], producto: [], marketing: [], gestion: [] };
const unread = { ceo: 0, producto: 0, marketing: 0, gestion: 0 };

// ── RENDER INICIAL ─────────────────────────────────────────────────────────────
function renderPanel(agent) {
  const a = AGENTS[agent];
  const panel = document.getElementById('chat-panel');
  panel.innerHTML = `
    <div class="agent-header">
      <div class="agent-avatar" style="background:${a.bg};color:${a.color}">${a.initials}</div>
      <div>
        <div class="agent-name" style="color:${a.color}">${a.name}</div>
        <div class="agent-role">${a.role}</div>
      </div>
      <button class="clear-btn" onclick="clearChat('${agent}')">limpiar</button>
    </div>
    <div class="messages" id="msgs-${agent}">
      ${histories[agent].length === 0 ? renderWelcome(agent) : ''}
    </div>
    <div class="input-area">
      <div class="attach-row">
        <button class="attach-btn" onclick="document.getElementById('file-${agent}').click()">📎 Adjuntar</button>
        <input type="file" id="file-${agent}" style="display:none" onchange="attachFile('${agent}',this)">
        <div id="filechips-${agent}">${renderChips(agent)}</div>
      </div>
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="input-${agent}" placeholder="${a.placeholder}" rows="1"
            onkeydown="handleKey(event,'${agent}')" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="sendbtn-${agent}" onclick="sendMessage('${agent}')">↑</button>
      </div>
      <div class="input-hint">Enter para enviar · Shift+Enter para nueva línea</div>
    </div>
  `;
  // Re-renderizar mensajes existentes
  if (histories[agent].length > 0) reRenderMessages(agent);
}

function renderWelcome(agent) {
  const a = AGENTS[agent];
  const qps = a.quickPrompts.map(q =>
    `<button class="qp" onclick="quickSend('${agent}','${q.text.replace(/'/g,"&#39;")}')">${q.label}</button>`
  ).join('');
  return `
    <div class="welcome">
      <div class="welcome-icon" style="background:${a.bg}">${a.initials === 'CEO' ? '★' : a.initials === 'PRD' ? '⚙' : a.initials === 'MKT' ? '◆' : '▣'}</div>
      <h3>${a.name}</h3>
      <p>${a.welcome}</p>
      <div class="quick-prompts">${qps}</div>
    </div>`;
}

function reRenderMessages(agent) {
  const container = document.getElementById('msgs-' + agent);
  if (!container) return;
  container.innerHTML = '';
  histories[agent].forEach(m => {
    if (m._display) appendBubble(agent, m.role === 'user' ? 'user' : 'agent', m._display, m._tag);
  });
}

// ── NAVEGACIÓN ─────────────────────────────────────────────────────────────────
function showAgent(agent) {
  currentAgent = agent;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.agent === agent));
  unread[agent] = 0;
  updateBadge(agent);
  renderPanel(agent);
  setTimeout(() => scrollToBottom(agent), 50);
}

function updateBadge(agent) {
  const badge = document.getElementById('badge-' + agent);
  if (unread[agent] > 0) {
    badge.textContent = unread[agent];
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

// ── MENSAJES ──────────────────────────────────────────────────────────────────
function appendBubble(agent, role, content, tag) {
  const container = document.getElementById('msgs-' + agent);
  if (!container) return;
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();

  const a = AGENTS[agent];
  const tagHtml = tag ? `<div class="agent-tag" style="background:${a.bg};color:${a.color}">${tag}</div>` : '';
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = `
    <div class="msg-av" style="${role === 'user' ? '' : `background:${a.bg};color:${a.color}`}">${role === 'user' ? 'vos' : a.initials}</div>
    <div>
      ${tagHtml}
      <div class="msg-bubble">${formatText(content)}</div>
    </div>`;
  container.appendChild(div);
  scrollToBottom(agent);
  return div;
}

function appendDelegation(fromAgent, toAgent, motivo) {
  const container = document.getElementById('msgs-' + fromAgent);
  if (!container) return;
  const a = AGENTS[toAgent];
  const div = document.createElement('div');
  div.className = 'delegation-notice';
  div.innerHTML = `<span class="arrow">→</span> Delegando a <strong style="color:${a.color}">${a.name}</strong> — ${motivo}`;
  container.appendChild(div);
  scrollToBottom(fromAgent);
}

function showTyping(agent) {
  const container = document.getElementById('msgs-' + agent);
  if (!container) return;
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();
  const a = AGENTS[agent];
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'typing-' + agent;
  div.innerHTML = `
    <div class="msg-av" style="background:${a.bg};color:${a.color}">${a.initials}</div>
    <div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  container.appendChild(div);
  scrollToBottom(agent);
}

function hideTyping(agent) {
  const el = document.getElementById('typing-' + agent);
  if (el) el.remove();
}

function scrollToBottom(agent) {
  const c = document.getElementById('msgs-' + agent);
  if (c) c.scrollTop = c.scrollHeight;
}

// ── ENVIAR MENSAJE ─────────────────────────────────────────────────────────────
async function sendMessage(agent) {
  const input = document.getElementById('input-' + agent);
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('sendbtn-' + agent).disabled = true;
  input.value = '';
  input.style.height = 'auto';

  let userContent = text;
  if (files[agent].length > 0) {
    userContent += '\n\n[Archivos adjuntos]\n' + files[agent].map(f => `Archivo: ${f.name}\n${f.content.slice(0, 3000)}`).join('\n\n');
    files[agent] = [];
    document.getElementById('filechips-' + agent).innerHTML = '';
  }

  // Mostrar mensaje del usuario
  appendBubble(agent, 'user', text);
  histories[agent].push({ role: 'user', content: userContent, _display: text });

  if (agent === 'ceo') {
    await handleCEO(userContent);
  } else {
    await callAgent(agent, userContent);
  }

  document.getElementById('sendbtn-' + agent).disabled = false;
  input?.focus();
}

// ── LÓGICA CEO → DELEGACIÓN ────────────────────────────────────────────────────
async function handleCEO(userContent) {
  showTyping('ceo');
  try {
    const ceoMessages = histories['ceo'].filter(m => m.role === 'user').map(m => ({ role: 'user', content: m.content }));
    // Agregar respuestas previas del CEO si existen
    const fullHistory = histories['ceo']
      .filter(m => m._display)
      .map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content || m._display }));

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: AGENTS.ceo.system, messages: fullHistory })
    });
    const data = await res.json();
    hideTyping('ceo');

    const raw = data.content?.[0]?.text || '';
    let parsed;
    try {
      const jsonMatch = raw.match(/\{[\s\S]*\}/);
      parsed = JSON.parse(jsonMatch ? jsonMatch[0] : raw);
    } catch {
      // Si el CEO no devuelve JSON válido, mostrar como texto normal
      appendBubble('ceo', 'agent', raw);
      histories['ceo'].push({ role: 'assistant', content: raw, _display: raw });
      return;
    }

    // Mostrar resumen del CEO
    const ceoText = `**Análisis:** ${parsed.resumen}\n\n**Delegando a:** ${AGENTS[parsed.delegar_a]?.name || parsed.delegar_a}`;
    appendBubble('ceo', 'agent', ceoText);
    histories['ceo'].push({ role: 'assistant', content: raw, _display: ceoText });

    // Mostrar notificación de delegación
    const destAgent = parsed.delegar_a;
    if (AGENTS[destAgent]) {
      appendDelegation('ceo', destAgent, parsed.motivo);

      // Notificar con badge
      if (currentAgent !== destAgent) {
        unread[destAgent]++;
        updateBadge(destAgent);
      }

      // Llamar al agente destino con la instrucción del CEO
      await callAgent(destAgent, parsed.instruccion, true);
    }

  } catch (err) {
    hideTyping('ceo');
    appendBubble('ceo', 'agent', 'Hubo un error al conectar. Verificá tu conexión.');
  }
}

// ── LLAMAR A UN AGENTE ─────────────────────────────────────────────────────────
async function callAgent(agent, instruction, fromCEO = false) {
  // Si no estamos en ese panel, renderizarlo en background para tener el container
  const needsRender = !document.getElementById('msgs-' + agent);

  if (fromCEO) {
    // Cambiar automáticamente al panel del agente destino
    showAgent(agent);
    await new Promise(r => setTimeout(r, 100));
  }

  const container = document.getElementById('msgs-' + agent);
  if (!container) return;

  if (fromCEO) {
    const a = AGENTS[agent];
    const notice = document.createElement('div');
    notice.className = 'delegation-notice';
    notice.innerHTML = `<span style="color:var(--ceo)">★</span> Instrucción recibida del CEO`;
    container.appendChild(notice);
    scrollToBottom(agent);
  }

  histories[agent].push({ role: 'user', content: instruction, _display: fromCEO ? null : instruction });

  showTyping(agent);

  try {
    const messages = histories[agent]
      .filter(m => m.content)
      .map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.content }));

    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: AGENTS[agent].system, messages })
    });
    const data = await res.json();
    hideTyping(agent);

    const reply = data.content?.[0]?.text || 'Sin respuesta.';
    histories[agent].push({ role: 'assistant', content: reply, _display: reply });
    appendBubble(agent, 'agent', reply);

  } catch (err) {
    hideTyping(agent);
    appendBubble(agent, 'agent', 'Error al conectar con el agente.');
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function quickSend(agent, text) {
  showAgent(agent);
  setTimeout(() => {
    const input = document.getElementById('input-' + agent);
    if (input) { input.value = text; sendMessage(agent); }
  }, 100);
}

function clearChat(agent) {
  histories[agent] = [];
  files[agent] = [];
  unread[agent] = 0;
  updateBadge(agent);
  renderPanel(agent);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e, agent) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(agent); }
}

function attachFile(agent, input) {
  if (!input.files[0]) return;
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = (e) => {
    files[agent].push({ name: file.name, content: e.target.result });
    document.getElementById('filechips-' + agent).innerHTML = renderChips(agent);
  };
  reader.readAsText(file);
  input.value = '';
}

function renderChips(agent) {
  return files[agent].map((f, i) =>
    `<div class="file-chip">📄 ${f.name} <button onclick="removeFile('${agent}',${i})">×</button></div>`
  ).join('');
}

function removeFile(agent, idx) {
  files[agent].splice(idx, 1);
  const el = document.getElementById('filechips-' + agent);
  if (el) el.innerHTML = renderChips(agent);
}

function formatText(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```[\w]*\n?([\s\S]*?)```/g, '<pre>$1</pre>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h3>$1</h3>')
    .replace(/^# (.+)$/gm,'<h3>$1</h3>')
    .replace(/^[-•] (.+)$/gm,'<li>$1</li>')
    .replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>');

  html = html.replace(/(<li>[\s\S]*?<\/li>)(?=\s*<li>|$)/g, (match) => match);
  html = html.replace(/(<li>.*<\/li>(\s*<li>.*<\/li>)*)/gs, '<ul>$1</ul>');
  html = html.replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>');
  if (!html.startsWith('<')) html = '<p>' + html + '</p>';
  return html;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
renderPanel('ceo');
</script>
